<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测测你的真命天子类型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9a9e 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '💕 💑 💕 💑 💕 💑 💕 💑 💕 💑 💕 💑 💕 💑 💕 💑 💕 💑 💕 💑';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            font-size: 3rem; opacity: 0.08; line-height: 1.5;
            word-wrap: break-word; pointer-events: none; z-index: 0;
            animation: float 20s linear infinite;
        }
        @keyframes float { 0%{transform:translateY(0) rotate(0deg)} 100%{transform:translateY(-100px) rotate(5deg)} }
        .container { position:relative; z-index:1; max-width:600px; margin:0 auto; background:#fff; border-radius:20px; padding:30px 20px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        h1 { text-align:center; font-size:2rem; background:linear-gradient(45deg,#ff6b6b,#feca57); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
        .subtitle { text-align:center; color:#888; font-size:.9rem; margin-bottom:25px; }
        .progress-bar { background:#eee; height:8px; border-radius:4px; margin-bottom:25px; overflow:hidden; }
        .progress-fill { background:linear-gradient(90deg,#ff6b6b,#feca57); height:100%; border-radius:4px; transition:width .3s; }
        .question-card { margin-bottom:20px; }
        .question-num { color:#ff6b6b; font-size:.85rem; margin-bottom:8px; }
        .question-text { font-size:1.1rem; font-weight:500; margin-bottom:15px; line-height:1.5; }
        .options { display:flex; flex-direction:column; gap:10px; }
        .option { background:#f8f9fa; border:2px solid transparent; border-radius:12px; padding:14px 16px; cursor:pointer; transition:all .2s; font-size:.95rem; }
        .option:hover { background:#ffe0e0; border-color:#ff6b6b; }
        .option.selected { background:linear-gradient(45deg,#ff6b6b,#feca57); color:#fff; border-color:#ff6b6b; }
        .btn { background:linear-gradient(45deg,#ff6b6b,#feca57); color:#fff; border:none; padding:15px 40px; border-radius:25px; font-size:1rem; cursor:pointer; display:block; margin:30px auto 0; transition:transform .2s; text-decoration:none; text-align:center; }
        .btn:hover { transform:scale(1.05); }
        .hidden { display:none; }
        .start-screen { text-align:center; }
        .intro-text { color:#666; font-size:1rem; line-height:1.8; margin-bottom:25px; text-align:left; }
        .result-screen { text-align:center; }
        .result-icon { font-size:4rem; margin-bottom:15px; }
        .result-title { font-size:1.8rem; font-weight:bold; margin-bottom:10px; background:linear-gradient(45deg,#ff6b6b,#feca57); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .result-type { display:inline-block; padding:10px 25px; border-radius:25px; font-size:1rem; margin-bottom:20px; color:#fff; background:linear-gradient(45deg,#ff6b6b,#feca57); }
        .result-desc { color:#666; line-height:1.8; margin-bottom:25px; text-align:left; background:#f8f9fa; padding:20px; border-radius:12px; }
        .result-section { margin-bottom:15px; }
        .result-section h3 { color:#ff6b6b; font-size:1rem; margin-bottom:8px; }
        .share-btn { background:#25d366; margin-top:15px; }
        .link-card { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-radius:14px; padding:18px; margin:15px auto; max-width:400px; text-align:center; }
        .link-card p { font-size:.9rem; line-height:1.5; margin-bottom:10px; opacity:.9; }
        .link-card .btn { background:#fff; color:#667eea; font-size:.9rem; padding:10px 28px; margin:0 auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="start-screen" id="start-screen">
        <h1>🔮 测测你的真命天子类型</h1>
        <p class="subtitle">15道题，测出你真正会遇到什么样的TA</p>
        <div class="intro-text">
            <p style="margin-bottom:15px">不是许愿，而是<strong>现实预测</strong>！</p>
            <p style="margin-bottom:15px">根据你的<strong>生活环境、工作性质、社交能力、颜值水平</strong>等实际条件</p>
            <p style="margin-bottom:15px">分析你<strong>真正有可能遇到</strong>的伴侣类型</p>
            <p>15道题，给你<strong>最靠谱</strong>的答案！</p>
        </div>
        <p style="color:#888;font-size:.9rem;margin-bottom:20px">已有 128,888 人参与测试</p>
        <button class="btn" onclick="startTest()">开始测试</button>
        <div style="color:#999;font-size:.75rem;margin-top:30px"><strong>免责声明：</strong>本测试基于现实条件分析，仅供娱乐参考</div>
    </div>
    <div class="hidden" id="quiz-screen">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="question-card" id="question-area"></div>
    </div>
    <div class="hidden result-screen" id="result-screen"></div>
</div>
<script>
const questions=[
{text:'你目前的生活/工作环境是？',options:[{text:'农村/小镇，生活圈子小',type:'home'},{text:'三四线城市，普通上班族',type:'gentle'},{text:'二线城市，有一定社交圈',type:'sport'},{text:'一线城市/国外，接触面广',type:'money'}]},
{text:'你的工作性质是？',options:[{text:'服务业/工厂/基层，接触普通人',type:'home'},{text:'办公室/行政，同事关系简单',type:'gentle'},{text:'销售/市场/公关，需要社交',type:'sport'},{text:'金融/互联网/高管，接触精英',type:'money'}]},
{text:'你的社交频率如何？',options:[{text:'基本宅家，很少出门社交',type:'home'},{text:'偶尔朋友聚会，不主动拓展',type:'gentle'},{text:'经常参加各类活动，爱认识人',type:'sport'},{text:'商务社交多，圈子层次高',type:'money'}]},
{text:'你的性格更偏向？',options:[{text:'乖巧听话，传统保守',type:'gentle'},{text:'温柔内向，不善表达',type:'home'},{text:'独立自信，有主见',type:'study'},{text:'外向活泼，敢爱敢恨',type:'sport'}]},
{text:'陌生人第一次见你，通常会？',options:[{text:'没什么特别反应，像对待普通人',type:'home'},{text:'态度友好，愿意多聊几句',type:'gentle'},{text:'主动搭讪或要联系方式',type:'sport'},{text:'明显表现出好感或惊艳',type:'money'}]},
{text:'你平时喜欢去这些地方吗？',options:[{text:'基本不去，在家刷手机',type:'home'},{text:'偶尔去商场/电影院',type:'gentle'},{text:'常去健身房/球场/户外',type:'sport'},{text:'喜欢去艺术展/音乐会/酒吧',type:'art'}]},
{text:'你工作或生活中，经常接触到的人群是？',options:[{text:'工厂/服务业同事，大家早早工作',type:'home'},{text:'普通上班族，大专本科为主',type:'gentle'},{text:'专业人士，医生律师工程师等',type:'study'},{text:'高管/精英，名校海归很多',type:'money'}]},
{text:'你平时购物，更看重什么？',options:[{text:'性价比，实用耐用最重要',type:'home'},{text:'适合自己，不盲目跟风',type:'gentle'},{text:'品质和体验，愿意多花钱',type:'sport'},{text:'品牌和档次，彰显身份',type:'money'}]},
{text:'你更擅长/喜欢做什么？',options:[{text:'做家务/照顾人，贤妻良母型',type:'gentle'},{text:'专注工作/学习，事业型',type:'study'},{text:'运动健身，保持身材',type:'sport'},{text:'艺术爱好，琴棋书画',type:'art'}]},
{text:'你对未来的规划是？',options:[{text:'安稳过日子，不求大富大贵',type:'home'},{text:'组建家庭，相夫教子',type:'gentle'},{text:'事业有成，独立女性',type:'study'},{text:'嫁入豪门/找优质男，提升阶层',type:'money'}]},
{text:'你身边的异性资源如何？',options:[{text:'很少接触异性，圈子封闭',type:'home'},{text:'有普通同事/同学，没合适的',type:'gentle'},{text:'有不少追求者，选择多',type:'sport'},{text:'接触优质男多，但竞争激烈',type:'money'}]},
{text:'你觉得自己最大的吸引力是？',options:[{text:'性格好，温柔体贴',type:'gentle'},{text:'能力强，独立能干',type:'study'},{text:'身材好，颜值在线',type:'sport'},{text:'有气质，有品位',type:'art'}]},
{text:'你能接受的感情模式是？',options:[{text:'男主外女主内，传统模式',type:'gentle'},{text:'各自独立，互相尊重',type:'study'},{text:'激情浪漫，轰轰烈烈',type:'sport'},{text:'对方主导，我配合就好',type:'home'}]},
{text:'你现在的年龄阶段？',options:[{text:'20岁以下，还很年轻',type:'school'},{text:'20-25岁，正值青春',type:'sport'},{text:'25-30岁，考虑结婚',type:'gentle'},{text:'30岁以上，成熟稳重',type:'study'}]},
{text:'如果朋友给你介绍对象，你更希望对方？',options:[{text:'踏实可靠，能一起过日子',type:'home'},{text:'性格温和，相处舒服',type:'gentle'},{text:'能力相当，能互相理解',type:'study'},{text:'条件优越，能提升生活品质',type:'money'}]}
];

const resultTypes={
home:{icon:'🏠',name:'贤惠居家型',desc:'你注定会遇到一个踏实可靠的TA。你们的生活不会轰轰烈烈，但会很温馨。TA可能是你的同学、老乡、或者同一个小镇的人。你们会一起逛超市、一起做饭、一起看电视剧。平凡但幸福。',traits:['踏实顾家','温柔体贴','生活简单但温馨'],match:'你们会在日常生活中日久生情'},
gentle:{icon:'🤗',name:'温柔守护型',desc:'你注定会遇到一个温柔体贴的TA。TA会默默记住你所有的喜好，在你难过时递上一杯热饮，在你开心时陪你笑。你们的爱情没有惊天动地，但每一刻都让人安心。',traits:['温柔细腻','体贴入微','默默守护'],match:'TA可能是你的同事、邻居或朋友介绍'},
sport:{icon:'☀️',name:'阳光治愈型',desc:'你注定会遇到一个阳光积极的TA。TA永远充满正能量，和你在一起没有压力只有快乐。你们会一起去旅行、一起运动、一起尝试新鲜事物。',traits:['阳光开朗','积极向上','热爱生活'],match:'你们会在社交场合或户外活动中相遇'},
money:{icon:'💎',name:'霸道惊喜型',desc:'你注定会遇到一个行动力极强的TA。TA嘴上不说，但会默默为你安排好一切。可能突然出现在你楼下，可能飞越千里来见你。爱你是动词不是形容词。',traits:['行动力强','霸道深情','嘴硬心软'],match:'TA可能是你的客户、领导或商务社交中认识的人'},
study:{icon:'🧠',name:'理性成熟型',desc:'你注定会遇到一个成熟稳重的TA。TA吵架会分析问题而不是发脾气，做决定会考虑长远而不是冲动。你们的关系建立在尊重和理解之上。',traits:['成熟理性','靠谱稳重','善于沟通'],match:'TA可能是你的同行、上级或专业领域认识的人'},
art:{icon:'🎨',name:'浪漫艺术型',desc:'你注定会遇到一个浪漫有品位的TA。TA会给你写情书、会策划惊喜、会在平凡的日子里创造仪式感。和TA在一起，生活像一首诗。',traits:['浪漫多情','品味独特','仪式感满满'],match:'你们会在艺术展、音乐会或创意圈相遇'},
school:{icon:'🎓',name:'校园纯爱型',desc:'你还年轻，你的真命天子很可能就在校园里。那种上课偷偷看你、放学等你一起走、考试给你传纸条的人——就是TA了。',traits:['纯真浪漫','青涩甜蜜','一起成长'],match:'TA就在你的学校或补习班'},
romance:{icon:'💕',name:'命中注定型',desc:'你注定会遇到一个让你相信命运的人。你们的相遇充满巧合，仿佛冥冥中自有安排。TA可能来自一个你从未想过的地方，但一旦相遇就无法分开。',traits:['命中注定','灵魂伴侣','无法替代'],match:'你们的相遇会充满巧合和不可思议'}
};

let curQ=0, typeCounts={};
function startTest(){
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    curQ=0; typeCounts={};
    showQuestion();
}
function showQuestion(){
    const q=questions[curQ];
    const pct=(curQ/questions.length*100);
    document.getElementById('progress').style.width=pct+'%';
    let h='<div class="question-num">第'+(curQ+1)+'题 / 共'+questions.length+'题</div>';
    h+='<div class="question-text">'+q.text+'</div><div class="options">';
    q.options.forEach((o,i)=>{h+='<div class="option" onclick="selectOpt('+i+')">'+o.text+'</div>';});
    h+='</div>';
    document.getElementById('question-area').innerHTML=h;
}
function selectOpt(idx){
    const q=questions[curQ];
    const opts=document.querySelectorAll('.option');
    opts.forEach((o,i)=>{if(i===idx)o.classList.add('selected');else o.style.opacity='.4';});
    typeCounts[q.options[idx].type]=(typeCounts[q.options[idx].type]||0)+1;
    setTimeout(()=>{curQ++;if(curQ<questions.length)showQuestion();else showResult();},400);
}
function showResult(){
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('progress').style.width='100%';
    const sorted=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
    const topType=sorted[0][0];
    const r=resultTypes[topType]||resultTypes.romance;
    let traitsHtml=r.traits.map(t=>'✨ '+t).join('<br>');
    let h='<div class="result-icon">'+r.icon+'</div>';
    h+='<div class="result-title">你的真命天子类型</div>';
    h+='<div class="result-type">'+r.name+'</div>';
    h+='<div class="result-desc">'+r.desc+'</div>';
    h+='<div class="result-section"><h3>TA的特质</h3><div style="text-align:left;color:#666;line-height:2">'+traitsHtml+'</div></div>';
    h+='<div class="result-section"><h3>你们会怎么相遇</h3><div style="text-align:left;color:#666;line-height:1.8">'+r.match+'</div></div>';

    // ====== 新增：吸引力测试链接 ======
    h+='<div class="link-card">';
    h+='<p>💎 想知道你的异性吸引力指数吗？<br>测测你在异性眼中的真实"市场价"</p>';
    h+='<a href="attraction.html" class="btn" style="display:inline-block;margin:0 auto">测异性吸引力指数 →</a>';
    h+='</div>';
    // ====== 新增结束 ======

    h+='<button class="btn" onclick="location.reload()">再测一次</button>';
    h+='<div style="color:#999;font-size:.75rem;margin-top:20px"><strong>免责声明：</strong>本测试基于现实条件分析，仅供娱乐参考</div>';
    document.getElementById('result-screen').innerHTML=h;
}
</script>
</body>
</html>
