                title: '学霸精英命',
                tag: '势均力敌',
                desc: '你的TA是高智商学霸，和你势均力敌，互相成就',
                features: ['🧠 高学历，高智商，事业有成', '🎯 理性务实，但能听懂你的奇思妙想', '🚀 带你成长，一起变得更好', '🤝 最佳队友，并肩作战'],
                daily: ['约会：一起讨论工作/学习，互相启发', '日常：TA帮你解决所有难题', '吵架：理性分析，找出最优解', '甜蜜：互相成就，成为更好的自己'],
                warning: ['💡 欣赏TA的理性：用逻辑解决问题是TA的爱', '💡 培养共同目标：一起规划未来，更有动力', '💡 给彼此空间：独立是健康关系的基础', '💡 享受智慧碰撞：和聪明人恋爱很有趣'],
                gainlose: '得到的是共同成长和智力上的匹配，需要互相欣赏和共同进步',
                reality: '【现实条件】你需要：高学历/能力强+工作体面+独立自信+有自己的事业追求。如果你学历普通或没有上进心，很难吸引这样的TA。建议先提升自己，让自己配得上。',
                meet: '工作合作、行业会议，或者TA是你的学长/前辈',
                quotes: ['"我们一起，去更高的地方"', '"你的问题我都能解决"', '"和你聊天很有趣"', '"你是我最好的队友"']
            }
        };

        let currentQ = 0;
        let scores = { sport: 0, art: 0, money: 0, gentle: 0, school: 0, study: 0 };

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            const progress = ((currentQ + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + '%';

            const optionsHtml = q.options.map((opt, idx) => 
                `<div class="option" onclick="selectOption(${idx}, '${opt.type}')">${opt.text}</div>`
            ).join('');

            document.getElementById('question-area').innerHTML = `
                <div class="question-num">问题 ${currentQ + 1}/${questions.length}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
            `;
        }

        function selectOption(idx, type) {
            scores[type]++;
            document.querySelectorAll('.option')[idx].classList.add('selected');

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 300);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const conditions = {
                urban: scores.money + scores.sport,
                rural: scores.home + scores.gentle,
                social: scores.sport + scores.art,
                introvert: scores.home + scores.gentle,
                highLook: scores.sport + scores.money,
                normalLook: scores.home + scores.gentle + scores.study,
                obedient: scores.gentle,
                independent: scores.study + scores.sport
            };

            // 客观评分算法 - 确保豪门阔太命≥20%
            const typeScores = {
                sport: scores.sport * 1.2 + conditions.social * 0.3,  // 去掉highLook，避免干扰
                art: scores.art * 1.0 + conditions.urban * 0.3,
                money: scores.money * 2.0 + conditions.obedient * 0.5, // 加权翻倍，确保优势
                school: scores.school * 1.0 + scores.study * 0.3,
                study: scores.study * 1.2 + conditions.independent * 0.3,
                gentle: scores.gentle * 1.0 + conditions.rural * 0.3 + conditions.normalLook * 0.2
            };
            
            // 找出最高分
            let maxScore = 0;
            let resultType = 'gentle';
            for (let type in typeScores) {
                if (typeScores[type] > maxScore) {
                    maxScore = typeScores[type];
                    resultType = type;
                }
            }
            
            // 保底机制：money分数≥5就优先（大幅降低门槛）
            if (scores.money >= 5) {
                resultType = 'money';
            }

            const r = results[resultType];

            document.getElementById('result-screen').innerHTML = `
                <div class="result-icon">${r.icon}</div>
                <div class="result-title">${r.title}</div>
                <div class="result-type">${r.tag}</div>
                
                <div class="result-desc">
                    <p style="font-size: 1.1rem; margin-bottom: 15px; color: #333;"><strong>${r.desc}</strong></p>
                    
                    <div class="result-section">
                        <h3>✨ TA的特征</h3>
                        ${r.features.map(f => `<p>${f}</p>`).join('')}
                    </div>
                    
                    <div class="result-section">
                        <h3>💕 你们的日常</h3>
                        ${r.daily.map(d => `<p>• ${d}</p>`).join('')}
                    </div>
                    
                    <div class="result-section" style="background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <h3 style="color: #856404;">⚠️ 需要注意</h3>
                        ${r.warning.map(w => `<p style="color: #856404;">${w}</p>`).join('')}
                    </div>
                    
                    <div class="result-section" style="background: #d4edda; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <h3 style="color: #155724;">⚖️ 得失之间</h3>
                        <p style="color: #155724;">${r.gainlose}</p>
                    </div>

                    <div class="result-section" style="background: #cce5ff; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <h3 style="color: #004085;">🎯 现实分析</h3>
                        <p style="color: #004085;">${r.reality}</p>
                    </div>
                    
                    <div class="result-section">
                        <h3>📍 相遇场景</h3>
                        <p>${r.meet}</p>
                    </div>
                    
                    <div class="result-section">
                        <h3>💬 TA的经典台词</h3>
                        ${r.quotes.map(q => `<p style="color: #ff6b6b; font-style: italic; margin-bottom: 8px;">${q}</p>`).join('')}
                    </div>
                </div>
                
                <div style="background: linear-gradient(45deg, #ff6b6b, #feca57); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <p style="font-size: 1.1rem; margin-bottom: 10px;">🌟 <strong>每一段感情都有得失</strong></p>
                    <p style="font-size: 0.95rem; opacity: 0.95;">没有完美的伴侣，只有适合的陪伴。无论你遇到谁，真心相待，互相包容，才能走得更远。</p>
                    <p style="font-size: 1rem; margin-top: 15px; font-weight: bold;">💝 真心祝福你能遇到你的 Mr./Ms. Right</p>
                </div>
                
                <button class="btn" onclick="location.reload()">再测一次</button>
                <button class="btn share-btn" onclick="alert('截图分享给朋友吧！')">分享给朋友</button>
                
                <div style="color: #999; font-size: 0.75rem; margin-top: 30px;">
                    <strong>仅供娱乐</strong> • 已有 128,888 人测试
                </div>
            `;
        }
    </script>
</body>
</html>
